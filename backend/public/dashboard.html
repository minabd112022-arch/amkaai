<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>AMKAAI</h2>

    <button onclick="showSection('generate')">🎨 AI Image</button>
    <button onclick="showSection('gallery')">🖼 My Images</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Generate -->
    <div id="generate" class="section active">
      <h2>Create Image</h2>

      <textarea id="prompt" placeholder="Describe your image..."></textarea>

      <button onclick="generate()">Generate</button>

      <p id="credits"></p>

      <img id="preview">
    </div>

    <!-- Gallery -->
    <div id="gallery" class="section">
      <h2>My Images</h2>
      <div id="images" class="grid"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
